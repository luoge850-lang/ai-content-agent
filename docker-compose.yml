# ── AI Content Agent — Production Docker Compose ─────────
#
# Services: Nginx → FastAPI (gunicorn+uvicorn), Celery Worker, Celery Beat,
#           PostgreSQL 16, Redis 7
#
# Quick start:
#   docker compose up -d --build
#   docker compose logs -f api
#   docker compose exec api python -m app.seed
#   docker compose exec api alembic upgrade head
#
# All secrets come from .env (git-ignored).  Copy .env.example → .env first.

version: "3.9"

services:
  # ── Nginx — reverse proxy ──────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      # - "443:443"  # Uncomment for HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/certs:/etc/letsencrypt:ro  # Uncomment for HTTPS
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - backend

  # ── FastAPI backend (gunicorn + uvicorn workers) ───────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: ai-content-agent-api:latest
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aiagent:aiagent_prod@db:5432/ai_content_agent}
      REDIS_URL: ${REDIS_URL:-redis://:redis_prod@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis_prod@redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis_prod@redis:6379/2}
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@aicontentagent.local}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DEBUG: "false"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend
    # No ports exposed to host — only accessible via Nginx
    # For local dev without Docker, run uvicorn directly.

  # ── Celery worker — background tasks ───────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: ai-content-agent-api:latest
    command: >
      celery -A app.tasks.celery_app worker
      -Q email_queue,ai_queue,file_queue,default_queue
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-4}
      --max-tasks-per-child=200
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aiagent:aiagent_prod@db:5432/ai_content_agent}
      REDIS_URL: ${REDIS_URL:-redis://:redis_prod@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis_prod@redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis_prod@redis:6379/2}
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@aicontentagent.local}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ── Celery Beat — periodic task scheduler ──────────────
  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    image: ai-content-agent-api:latest
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://aiagent:aiagent_prod@db:5432/ai_content_agent}
      REDIS_URL: ${REDIS_URL:-redis://:redis_prod@redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:redis_prod@redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:redis_prod@redis:6379/2}
      JWT_SECRET: ${JWT_SECRET}
      DEBUG: "false"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  # ── PostgreSQL 16 ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aiagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiagent_prod}
      POSTGRES_DB: ${POSTGRES_DB:-ai_content_agent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiagent} -d ${POSTGRES_DB:-ai_content_agent}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend
    # No ports exposed to host — only accessible within the backend network

  # ── Redis 7 ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_prod}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_prod}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend
    # No ports exposed to host

# ── Persistent volumes ───────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ── Internal network ─────────────────────────────────────
networks:
  backend:
    driver: bridge
